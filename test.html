<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Login</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-border: rgba(15, 23, 42, 0.06);
      --text: #111827;
      --muted: #6b7280;
      --input-bg: #ffffff;
      --input-border: #e5e7eb;
      --input-focus: #111827;
      --primary: #111827;
      --primary-hover: #000000;
      --primary-text: #ffffff;
      --link: #111827;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
      --toggle-bg: #e5e7eb;
      --toggle-thumb: #ffffff;
      --ring: 0 0 0 4px rgba(17, 24, 39, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    input, button {
      font: inherit;
    }

    #theme-toggle {
      display: none;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 30%),
        radial-gradient(circle at bottom right, rgba(17,24,39,0.03), transparent 28%),
        var(--bg);
      transition: background 0.3s ease, color 0.3s ease;
    }

    #theme-toggle:checked ~ .app {
      --bg: #0f1115;
      --surface: rgba(24, 28, 35, 0.88);
      --surface-border: rgba(255, 255, 255, 0.06);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --input-bg: #141821;
      --input-border: #2a313d;
      --input-focus: #f3f4f6;
      --primary: #f3f4f6;
      --primary-hover: #ffffff;
      --primary-text: #111827;
      --link: #f3f4f6;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --toggle-bg: #2a313d;
      --toggle-thumb: #ffffff;
      --ring: 0 0 0 4px rgba(255, 255, 255, 0.08);
    }

    .shell {
      width: 100%;
      max-width: 420px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .brand-mark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text);
      opacity: 0.92;
    }

    .theme-switch {
      width: 52px;
      height: 30px;
      border-radius: 999px;
      background: var(--toggle-bg);
      padding: 3px;
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      position: relative;
      transition: background 0.25s ease;
    }

    .theme-switch .thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--toggle-thumb);
      transition: transform 0.25s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    #theme-toggle:checked ~ .app .theme-switch .thumb {
      transform: translateX(22px);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 34px 28px 28px;
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .eyebrow {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.2rem);
      line-height: 1.15;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .subtitle {
      margin: 12px 0 28px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.65;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .field input {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      padding: 0 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .field input::placeholder {
      color: #9ca3af;
    }

    .field input:focus {
      border-color: var(--input-focus);
      box-shadow: var(--ring);
    }

    .options {
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
    }

    .remember input {
      width: 15px;
      height: 15px;
      accent-color: var(--text);
      cursor: pointer;
    }

    .forgot {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .button {
      margin-top: 6px;
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      background: var(--primary);
      color: var(--primary-text);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .button:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 18px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      flex: 1;
      background: var(--input-border);
    }

    .socials {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .social-btn {
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--input-border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }

    .social-btn:hover {
      transform: translateY(-1px);
      background: rgba(127, 127, 127, 0.06);
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .footer a {
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .app {
        padding: 16px;
      }

      .card {
        padding: 28px 20px 22px;
        border-radius: 20px;
      }

      .socials {
        grid-template-columns: 1fr;
      }

      .options {
        flex-direction: column;
        align-items: flex-start;
      }

      h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <input type="checkbox" id="theme-toggle" />

  <main class="app">
    <div class="shell">
      <div class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>Minimal Auth</span>
        </div>

        <label class="theme-switch" for="theme-toggle" aria-label="테마 전환">
          <span class="thumb"></span>
        </label>
      </div>

      <section class="card">
        <div class="eyebrow">Sign in</div>
        <h1>다시 오신 걸 환영합니다</h1>
        <p class="subtitle">
          필요한 정보만 남긴 미니멀 로그인 화면입니다.
          깔끔한 여백과 차분한 대비로 집중감을 높였습니다.
        </p>

        <form class="form">
          <div class="field">
            <label for="email">이메일</label>
            <input
              id="email"
              type="email"
              placeholder="example@email.com"
              required
            />
          </div>

          <div class="field">
            <label for="password">비밀번호</label>
            <input
              id="password"
              type="password"
              placeholder="비밀번호를 입력하세요"
              required
            />
          </div>

          <div class="options">
            <label class="remember">
              <input type="checkbox" />
              로그인 상태 유지
            </label>
            <a href="#" class="forgot">비밀번호 찾기</a>
          </div>

          <button type="submit" class="button">로그인</button>
        </form>

        <div class="divider">또는</div>

        <div class="socials">
          <button type="button" class="social-btn">Google</button>
          <button type="button" class="social-btn">Kakao</button>
        </div>

        <p class="footer">
          계정이 없으신가요? <a href="#">회원가입</a>
        </p>
      </section>
    </div>
  </main>
</body>
</html>
